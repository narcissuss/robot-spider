<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Robot Spider 🕷️</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --border:   #1e1e2e;
      --accent:   #7c3aed;
      --accent2:  #a855f7;
      --green:    #22c55e;
      --red:      #ef4444;
      --amber:    #f59e0b;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 32px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo span { font-size: 1.3rem; }
    .conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 12px;
    }
    .conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .conn-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── ALARM BANNER ── */
    #alarmBanner {
      display: none;
      background: linear-gradient(90deg, #7f1d1d, #991b1b);
      border-bottom: 2px solid var(--red);
      padding: 14px 20px;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      animation: pulse-bg 1s infinite alternate;
    }
    #alarmBanner.show { display: block; }
    @keyframes pulse-bg {
      from { opacity: 1; }
      to   { opacity: 0.7; }
    }

    /* ── LAYOUT ── */
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── SENSORES ── */
    .sensors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .sensor-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .sensor-box.alerta { border-color: var(--red); background: #1a0808; }
    .sensor-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
    .sensor-val {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
    }
    .sensor-box.alerta .sensor-val { color: var(--red); }
    .sensor-status {
      font-size: 0.72rem;
      margin-top: 6px;
      color: var(--green);
      font-weight: 600;
    }
    .sensor-box.alerta .sensor-status { color: var(--red); }

    /* ── CONTROLES LED/BUZZER ── */
    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .toggle-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .toggle-item.active { border-color: var(--accent2); background: #1a0d2e; }
    .toggle-icon { font-size: 1.6rem; }
    .toggle-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    .toggle-item.active .toggle-label { color: var(--accent2); }
    .toggle-pill {
      width: 48px; height: 26px;
      border-radius: 99px;
      background: #1e1e2e;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-item.active .toggle-pill { background: var(--accent); }
    .toggle-pill::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      top: 3px; left: 3px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .toggle-item.active .toggle-pill::after { transform: translateX(22px); }

    /* ── DPAD ── */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      max-width: 220px;
      margin: 0 auto;
    }
    .dpad-btn {
      aspect-ratio: 1;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .dpad-btn:active { background: var(--accent); transform: scale(0.93); }
    .dpad-btn.stop {
      background: #1e1e2e;
      border-color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.5px;
    }
    .dpad-btn.stop:active { background: var(--accent); color: #fff; }
    .dpad-btn.empty { pointer-events: none; background: transparent; border-color: transparent; }

    /* ── ACCIONES ESPECIALES ── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .action-btn {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    .action-btn:active { background: var(--accent); border-color: var(--accent2); }

    /* ── WIFI INFO ── */
    .wifi-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .wifi-info strong { color: var(--text); }

    /* ── LOG ── */
    #log {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      max-height: 80px;
      overflow-y: auto;
      font-family: monospace;
      line-height: 1.6;
    }

    /* ── PC ── */
    @media (min-width: 540px) {
      main { padding: 28px 24px 0; }
      .dpad { max-width: 260px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🕷️</span> Robot Spider</div>
  <div class="conn-badge">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Desconectado</span>
  </div>
</header>

<div id="alarmBanner">⚠️ GAS DETECTADO — Mantente alejado</div>

<main>

  <!-- SENSORES -->
  <div class="card">
    <div class="card-title">Sensores de Gas</div>
    <div class="sensors">
      <div class="sensor-box" id="boxMQ2">
        <div class="sensor-label">MQ-2 (Humo/Alcohol)</div>
        <div class="sensor-val" id="valMQ2">—</div>
        <div class="sensor-status" id="stMQ2">Sin datos</div>
      </div>
      <div class="sensor-box" id="boxMQ135">
        <div class="sensor-label">MQ-135 (Aire/CO₂)</div>
        <div class="sensor-val" id="valMQ135">—</div>
        <div class="sensor-status" id="stMQ135">Sin datos</div>
      </div>
    </div>
  </div>

  <!-- LED & BUZZER -->
  <div class="card">
    <div class="card-title">Controles</div>
    <div class="toggles">
      <div class="toggle-item" id="ledToggle" onclick="toggleLED()">
        <div class="toggle-icon">💡</div>
        <div class="toggle-label" id="ledLabel">LED Apagado</div>
        <div class="toggle-pill"></div>
      </div>
      <div class="toggle-item" id="buzzerToggle" onclick="toggleBuzzer()">
        <div class="toggle-icon">🔔</div>
        <div class="toggle-label" id="buzzerLabel">Buzzer Apagado</div>
        <div class="toggle-pill"></div>
      </div>
    </div>
  </div>

  <!-- MOVIMIENTO -->
  <div class="card">
    <div class="card-title">Movimiento</div>
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="mover('adelante')">▲</div>
      <div class="dpad-btn empty"></div>

      <div class="dpad-btn" onclick="mover('izquierda')">◀</div>
      <div class="dpad-btn stop" onclick="mover('stop')">STOP</div>
      <div class="dpad-btn" onclick="mover('derecha')">▶</div>

      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="mover('atras')">▼</div>
      <div class="dpad-btn empty"></div>
    </div>
  </div>

  <!-- ACCIONES -->
  <div class="card">
    <div class="card-title">Acciones especiales</div>
    <div class="actions">
      <div class="action-btn" onclick="mover('saludo')">👋 Saludar</div>
      <div class="action-btn" onclick="mover('stop')">🦵 Neutral</div>
    </div>
  </div>

  <!-- INFO WIFI -->
  <div class="card">
    <div class="card-title">Estado del Robot</div>
    <div class="wifi-info">
      📶 Red: <strong id="wifiName">—</strong>
    </div>
    <div id="log" style="margin-top:10px">Esperando conexión...</div>
  </div>

</main>

<script>
  // =====================================================
  // CONFIGURACIÓN MQTT
  // =====================================================
  const DEVICE_ID  = "robot_spider_001";
  const BROKER     = "test.mosquitto.org";
  const PORT       = 8081;           // WebSocket seguro (WSS)
  const UMBRAL     = 1500;

  // =====================================================
  // Estado local
  // =====================================================
  let ledOn    = false;
  let buzzerOn = false;
  let client   = null;

  // =====================================================
  // LOG
  // =====================================================
  function log(msg) {
    const el = document.getElementById("log");
    const line = document.createElement("div");
    const now = new Date();
    const t = now.getHours().toString().padStart(2,'0') + ':' +
              now.getMinutes().toString().padStart(2,'0') + ':' +
              now.getSeconds().toString().padStart(2,'0');
    line.textContent = t + "  " + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
    // Máximo 50 líneas
    while (el.children.length > 50) el.removeChild(el.firstChild);
  }

  // =====================================================
  // CONEXIÓN MQTT (WebSocket)
  // =====================================================
  function conectar() {
    const cid = "panel_" + Math.random().toString(16).slice(2, 8);
    client = new Paho.MQTT.Client(BROKER, PORT, cid);

    client.onConnectionLost = (r) => {
      setConectado(false);
      log("Conexión perdida: " + r.errorMessage + ". Reconectando...");
      setTimeout(conectar, 4000);
    };

    client.onMessageArrived = onMensaje;

    client.connect({
      useSSL: true,
      onSuccess: () => {
        setConectado(true);
        log("Conectado al broker MQTT");
        client.subscribe(DEVICE_ID + "/estado");
        client.subscribe(DEVICE_ID + "/alerta");
        log("Escuchando al robot...");
      },
      onFailure: (e) => {
        setConectado(false);
        log("Error al conectar: " + e.errorMessage);
        setTimeout(conectar, 5000);
      },
      timeout: 10,
      keepAliveInterval: 30,
    });
  }

  function setConectado(ok) {
    document.getElementById("connDot").className   = "conn-dot" + (ok ? " on" : "");
    document.getElementById("connLabel").textContent = ok ? "Conectado" : "Desconectado";
  }

  // =====================================================
  // MENSAJE ENTRANTE DEL ROBOT
  // =====================================================
  function onMensaje(msg) {
    const t = msg.destinationName;
    const v = msg.payloadString;

    if (t === DEVICE_ID + "/alerta") {
      const esAlarma = v.includes("GAS DETECTADO");
      document.getElementById("alarmBanner").className = esAlarma ? "show" : "";
      log("Alerta: " + v);
      return;
    }

    if (t === DEVICE_ID + "/estado") {
      try {
        const d = JSON.parse(v);

        // Sensores
        actualizarSensor("MQ2",   d.mq2,   "boxMQ2",   "valMQ2",   "stMQ2");
        actualizarSensor("MQ135", d.mq135, "boxMQ135", "valMQ135", "stMQ135");

        // WiFi
        if (d.wifi) document.getElementById("wifiName").textContent = d.wifi;

        // LED y buzzer (sincroniza UI con estado real)
        if (d.led !== undefined)    actualizarToggle("ledToggle",    "ledLabel",    d.led,    "LED");
        if (d.buzzer !== undefined) actualizarToggle("buzzerToggle", "buzzerLabel", d.buzzer, "Buzzer");

        // Alarma banner
        if (d.alarma !== undefined) {
          document.getElementById("alarmBanner").className = d.alarma ? "show" : "";
        }

      } catch(e) { log("Error parsing JSON: " + e); }
    }
  }

  function actualizarSensor(nombre, valor, boxId, valId, stId) {
    if (valor === undefined) return;
    const box = document.getElementById(boxId);
    const valEl = document.getElementById(valId);
    const stEl  = document.getElementById(stId);
    valEl.textContent = valor;
    const alerta = valor >= UMBRAL;
    box.className  = "sensor-box" + (alerta ? " alerta" : "");
    stEl.textContent = alerta ? "⚠️ GAS DETECTADO" : "✅ Gas no detectado";
    stEl.style.color = alerta ? "var(--red)" : "var(--green)";
  }

  function actualizarToggle(toggleId, labelId, estado, nombre) {
    const el  = document.getElementById(toggleId);
    const lab = document.getElementById(labelId);
    if (estado) {
      el.classList.add("active");
      lab.textContent = nombre + " Encendido";
    } else {
      el.classList.remove("active");
      lab.textContent = nombre + " Apagado";
    }
  }

  // =====================================================
  // PUBLICAR AL ROBOT
  // =====================================================
  function publicar(topic, valor) {
    if (!client || !client.isConnected()) {
      log("Sin conexión MQTT");
      return;
    }
    const msg = new Paho.MQTT.Message(String(valor));
    msg.destinationName = DEVICE_ID + "/" + topic;
    msg.qos = 0;
    client.send(msg);
    log("Enviado → " + topic + ": " + valor);
  }

  function mover(dir) { publicar("movimiento", dir); }

  function toggleLED() {
    ledOn = !ledOn;
    publicar("led", ledOn ? "1" : "0");
    actualizarToggle("ledToggle", "ledLabel", ledOn, "LED");
  }

  function toggleBuzzer() {
    buzzerOn = !buzzerOn;
    publicar("buzzer", buzzerOn ? "1" : "0");
    actualizarToggle("buzzerToggle", "buzzerLabel", buzzerOn, "Buzzer");
  }

  // Inicia conexión al cargar
  conectar();
</script>
</body>
</html>
